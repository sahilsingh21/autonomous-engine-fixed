version: '3.9'

services:
  mongodb:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nicheai-engine
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build: .
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/nicheai-engine
      ENGINE_PORT: 4000
      AUTOSTART: "true"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  mongo_data:
